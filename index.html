<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle audio visualizer</title>
    <style>
        html,
        body,
        #canvas,
        #starfield {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            user-select: none;
        }

        /* Background slideshow layers (two stacked layers for crossfading) */
        #bg-layers {
            position: absolute;
            inset: 0;
            z-index: -20;
            overflow: hidden;
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            opacity: 0;
        }

        #bgA {
            opacity: 1;
        }

        /* Video background (Batch 6). Lives inside #bg-layers so blur + beat-zoom
           apply to it too. Hidden until a video is selected + enabled. */
        #bg-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Darkening overlay between the background and the starfield */
        #dim-overlay {
            position: absolute;
            inset: 0;
            z-index: -15;
            background: #000;
            opacity: 0;
            pointer-events: none;
        }

        #starfield {
            position: absolute;
            z-index: -10;
        }

        /* GPU warp overlay: sits exactly over #canvas, hidden until warp fires */
        #glcanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: none;
        }

        body {
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        #middle {
            object-fit: cover;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #debug {
            position: absolute;
            top: 0;
            left: 0;
            word-break: break-all;
            white-space: break-spaces;
        }
    </style>
</head>

<body>
    <div id="bg-layers">
        <div class="bg-layer" id="bgA"></div>
        <div class="bg-layer" id="bgB"></div>
        <video id="bg-video" muted loop autoplay playsinline></video>
    </div>

    <div id="dim-overlay"></div>

    <canvas id="starfield"></canvas>

    <div id="visualizer">
        <img id="middle" />
        <canvas id="canvas"></canvas>
        <!-- Batch 5: GPU warp overlay. When warp is active the 2D #canvas is
             hidden and used as a texture source; this WebGL canvas draws the
             displaced (ripple) result. Hidden entirely when warp is at rest. -->
        <canvas id="glcanvas"></canvas>
    </div>

    <pre id="debug"></pre>

    <!-- Slideshow playlist (regenerate with generate-playlist.bat). Loaded as a
         script tag on purpose: fetch() of local files is unreliable under file://,
         a script tag is not. Defines window.SLIDESHOW_FILES. -->
    <script src="images/playlist.js"></script>
    <!-- Video background list (regenerate with generate-playlist.bat). Same
         script-tag pattern as the image playlist; defines window.VIDEO_FILES. -->
    <script src="videos/playlist.js"></script>

    <script src="noise.js"></script>
    <script src="main.js"></script>
    <script src="stars.js"></script>
</body>

</html>
